<!DOCTYPE html>
<html class="light" lang="es">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>¡Compra confirmada! — Fumadorex</title>
<meta name="robots" content="noindex"/>
<link rel="icon" href="https://fumadorex.com.mx/imgs/fumadorex.png"/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; }
  h1, h2 { font-family: 'Manrope', system-ui, sans-serif; }
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center">
  <main class="max-w-md mx-auto p-6 text-center">
    <div class="w-16 h-16 bg-emerald-100 text-emerald-700 rounded-full flex items-center justify-center mx-auto mb-5">
      <span class="material-symbols-outlined text-4xl" style="font-variation-settings:'FILL' 1">check_circle</span>
    </div>
    <h1 class="text-2xl font-bold text-slate-900">¡Tu compra está confirmada!</h1>
    <p class="text-slate-600 mt-3">
      Recibirás un mensaje en tu <strong>WhatsApp</strong> en los próximos minutos con los pasos para empezar el programa, junto con un correo de confirmación de Stripe.
    </p>
    <p class="text-sm text-slate-500 mt-5">¿No te llegó nada en una hora? Escríbenos: <a class="text-emerald-700 font-semibold" href="https://wa.me/5215551234567">WhatsApp</a></p>
    <a href="/" class="inline-block mt-8 px-5 py-2.5 bg-emerald-600 text-white text-sm font-semibold rounded-md hover:bg-emerald-700">Volver al inicio</a>

    <script>
      if (typeof fbq === 'function') {
        fbq('track', 'Purchase', { value: 6999, currency: 'MXN' });
      }
    </script>
  </main>
</body>
</html>
