<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Token</title></head>
<body style="font-family:sans-serif;padding:40px;text-align:center">
<h2>Token capturado ✅</h2>
<p id="msg">Procesando...</p>
<input id="token" style="width:100%;padding:10px;margin-top:20px;font-size:12px" readonly>
<script>
var hash = window.location.hash.substring(1);
var params = {};
hash.split('&').forEach(function(p){var kv=p.split('=');params[kv[0]]=kv[1];});
var token = params['access_token'];
if(token){
  document.getElementById('token').value = decodeURIComponent(token);
  document.getElementById('msg').innerHTML = '<b>Copia este token y mándamelo:</b>';
} else {
  document.getElementById('msg').innerHTML = 'No se encontró token. URL: ' + window.location.href;
}
</script>
</body>
</html>
